name: Validate Config

on:
  pull_request:
    paths:
      - 'config.yaml'
      - 'config.example.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install vuln-scanner
        run: pip install -e .

      - name: Validate config.example.yaml
        run: vuln-scanner validate --config config.example.yaml

      - name: Validate config.yaml (if present)
        if: hashFiles('config.yaml') != ''
        run: vuln-scanner validate --config config.yaml
